name: CD Pipeline

on:
  push:
    paths:
      - 'envs/**'
    branches:
      - main
      
  workflow_dispatch:
    inputs:
      ECRURL:
        description: "ECR Registry URL (with / at end)"
        required: true
        default: "081654307023.dkr.ecr.ap-south-1.amazonaws.com/"
      REPO:
        description: "Repository Name"
        required: true
        default: "ledger"
      IMAGE:
        description: "Image Tag"
        required: true
      TEST:
        description: "Environment"
        required: true
        type: choice
        options:
          - functional
          - integration
          - regression
          - uat
          - release

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # -----------------------------
      # Checkout Deployment Repo
      # -----------------------------
      - name: Checkout Deployment Repo
        uses: actions/checkout@v4
        with:
          repository: lalithkumar1196/ledger
          ref: main
          token: ${{ secrets.GH_PAT }}

      # -----------------------------
      # Update values.yaml
      # -----------------------------
      - name: Update Helm values
        # Evaluates inputs safely inside the execution scope
        env:
          ENV_NAME: ${{ github.event.inputs.TEST || 'functional' }}
          ECR_URL: ${{ github.event.inputs.ECRURL || '081654307023.dkr.ecr.ap-south-1.amazonaws.com/' }}
          REPO_NAME: ${{ github.event.inputs.REPO || 'ledger' }}
          IMAGE_TAG: ${{ github.event.inputs.IMAGE }}
        run: |
          cd envs/${{ env.ENV_NAME }}

          echo "Updating image repository..."
          sed -i "s|repository:.*|repository: ${{ env.ECR_URL }}${{ env.REPO_NAME }}|g" values.yaml

          echo "Updating image tag..."
          sed -i "s|tag:.*|tag: ${{ env.IMAGE_TAG }}|g" values.yaml

          echo "Updated values.yaml:"
          cat values.yaml

      # -----------------------------
      # Commit & Push Changes
      # -----------------------------
      - name: Commit and Push
        # Evaluates the required tag variable specifically for the commit message scope
        env:
          IMAGE_TAG: ${{ github.event.inputs.IMAGE || 'rel28' }}
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add .
          git commit -m "New deployment for Build ${{ env.IMAGE_TAG }}" || echo "No changes to commit"

          git push origin main
